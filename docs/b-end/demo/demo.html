<html lang="zh-CN" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" vid="5">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" vid="6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;display=swap" rel="stylesheet" vid="7">
    <style vid="8">
        :root {
            
            --brand-red: #E91E63;
            --brand-purple: #9C27B0;
            --brand-gradient: linear-gradient(135deg, #E91E63 0%, #9C27B0 100%);
            
            
            --bg-canvas: #F9FAFB;
            --bg-surface: #FFFFFF;
            --bg-sidebar: #FFFFFF;
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --text-tertiary: #9CA3AF;
            --border-subtle: #F3F4F6;
            --border-medium: #E5E7EB;
            
            
            --radius-full: 9999px;
            --radius-md: 6px;
            --stroke-thin: 1px;
            
            
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            
            --sidebar-width: 240px;
            --topbar-height: 64px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        
        .app-container {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: var(--topbar-height) 1fr;
            height: 100vh;
        }

        
        .topbar {
            grid-column: 1 / -1;
            background: var(--bg-surface);
            border-bottom: var(--stroke-thin) solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        
        .brand-logo {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            border: var(--stroke-thin) solid transparent;
            background: linear-gradient(white, white) padding-box, var(--brand-gradient) border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 600;
            color: var(--brand-purple);
            position: relative;
        }

        .brand-name {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 18px;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-input {
            background: var(--bg-canvas);
            border: var(--stroke-thin) solid var(--border-medium);
            padding: 8px 16px;
            border-radius: var(--radius-md);
            font-size: 13px;
            width: 240px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--brand-purple);
        }

        
        .sidebar {
            background: var(--bg-sidebar);
            border-right: var(--stroke-thin) solid var(--border-subtle);
            padding: 24px 0;
            display: flex;
            flex-direction: column;
        }

        .nav-group {
            margin-bottom: 24px;
        }

        .nav-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-tertiary);
            padding: 0 24px 12px;
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 24px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            position: relative;
        }

        .nav-item:hover {
            color: var(--brand-purple);
            background: rgba(156, 39, 176, 0.03);
        }

        .nav-item.active {
            color: var(--brand-purple);
            background: rgba(156, 39, 176, 0.05);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            bottom: 20%;
            width: 3px;
            background: var(--brand-gradient);
            border-radius: 0 2px 2px 0;
        }

        
        .main-content {
            padding: 32px 48px;
            overflow-y: auto;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
        }

        .page-title h1 {
            font-family: var(--font-serif);
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .page-title p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        
        .btn-primary {
            padding: 10px 20px;
            background: var(--brand-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(233, 30, 99, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(233, 30, 99, 0.3);
        }

        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-surface);
            padding: 20px;
            border-radius: var(--radius-md);
            border: var(--stroke-thin) solid var(--border-subtle);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: var(--font-serif);
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        
        .table-container {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            border: var(--stroke-thin) solid var(--border-subtle);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: var(--bg-canvas);
            padding: 12px 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-tertiary);
            border-bottom: var(--stroke-thin) solid var(--border-subtle);
        }

        td {
            padding: 16px 20px;
            font-size: 14px;
            border-bottom: var(--stroke-thin) solid var(--border-subtle);
            color: var(--text-secondary);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .font-name {
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: var(--radius-full);
            font-weight: 600;
            background: rgba(156, 39, 176, 0.08);
            color: var(--brand-purple);
            text-transform: uppercase;
        }

        .status-badge {
            width: 8px;
            height: 8px;
            border-radius: var(--radius-full);
            display: inline-block;
            margin-right: 6px;
        }

        .status-active { background: #10B981; }
        .status-pending { background: #F59E0B; }

        .revenue-cell {
            font-family: var(--font-serif);
            font-weight: 600;
            color: var(--text-primary);
        }

        
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-medium);
            border-radius: 10px;
        }
    </style>
</head>
