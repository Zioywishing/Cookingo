        :root {

            --spacing-sm: 16px;
            --spacing-md: 24px;
            --spacing-lg: 40px;
            --spacing-xl: 64px;
            --transition-speed: 2s; 
        }

        body.theme-morning {
            --bg-base: #FFF5F0;
            --bg-surface: #FFE7D9;
            --text-main: #3D2012;
            --text-muted: rgba(61, 32, 18, 0.5);

            --accent-hover: #FF6A42;
            --glow-color: rgba(255, 130, 96, 0.4);
            --btn-text: #FFFFFF;
        }

        body.theme-noon {
            --bg-base: #FDFBF7; 
            --bg-surface: #F2EBE1;
            --text-main: #271E15; 
            --text-muted: rgba(39, 30, 21, 0.5);
            --accent: #DD6A2A; 
            --accent-hover: #C55C22;
            --glow-color: rgba(221, 106, 42, 0.3);
            --btn-text: #FFFFFF;
        }

        body.theme-evening {
            --bg-base: #2B160E;
            --bg-surface: #3D2218;
            --text-main: #FFF0E6;
            --text-muted: rgba(255, 240, 230, 0.6);
            --accent: #FF5E33;
            --accent-hover: #FF7A55;
            --glow-color: rgba(255, 94, 51, 0.2);
            --btn-text: #2B160E;
        }

        body.theme-night {
            --bg-base: #120C08;
            --bg-surface: #1E1510;
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent: #FF8200;
            --accent-hover: #FFA23A;
            --glow-color: rgba(255, 130, 0, 0.2);
            --btn-text: #120C08;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            background-color: #000; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color var(--transition-speed) ease;
        }

        .device-frame {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-base);
            transition: background-color var(--transition-speed) ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-aspect-ratio: 10/21) and (min-width: 600px) {
            .device-frame {
                height: 90vh;
                width: calc(90vh * (10 / 21));
                border-radius: var(--radius-large);
                box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 0 0 8px #000;
            }
        }

        .ambient-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .ambient-orb {
            position: absolute;
            width: 120vw;
            height: 120vw;
            border-radius: 50%;
            background: radial-gradient(circle, var(--glow-color) 0%, rgba(0,0,0,0) 70%);
            top: -20%;
            left: -10%;
            filter: blur(60px);
            animation: breathe 12s infinite alternate ease-in-out;
            transition: background var(--transition-speed) ease;
        }

        .ambient-orb:nth-child(2) {
            top: auto;
            bottom: -30%;
            left: auto;
            right: -20%;
            width: 150vw;
            height: 150vw;
            animation-delay: -6s;
            animation-duration: 18s;
        }

        @keyframes breathe {
            0% { transform: scale(1) translate(0, 0); opacity: 0.6; }
            100% { transform: scale(1.1) translate(5%, 5%); opacity: 1; }
        }

        .content-layer {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: var(--spacing-xl) 0 0 0;
        }

        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .no-scrollbar {
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }

        
        .theme-bg-base { background-color: var(--bg-base); transition: background-color var(--transition-speed) ease; }
        .theme-bg-surface { background-color: var(--bg-surface); transition: background-color var(--transition-speed) ease; }
        .theme-text-main { color: var(--text-main); transition: color var(--transition-speed) ease; }
        .theme-text-muted { color: var(--text-muted); transition: color var(--transition-speed) ease; }
        .theme-text-accent { color: var(--accent); transition: color var(--transition-speed) ease; }
        .theme-bg-accent { background-color: var(--accent); transition: background-color var(--transition-speed) ease; }
        .theme-border-accent { border-color: var(--accent); transition: border-color var(--transition-speed) ease; }
        .theme-border-surface { border-color: var(--bg-surface); transition: border-color var(--transition-speed) ease; }
        .theme-stroke-accent { stroke: var(--accent); transition: stroke var(--transition-speed) ease; }
        .theme-stroke-main { stroke: var(--text-main); transition: stroke var(--transition-speed) ease; }
        .theme-stroke-muted { stroke: var(--text-muted); transition: stroke var(--transition-speed) ease; }
        
        
        .recipe-card {
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(1);
        }
        .recipe-card:active {
            transform: scale(0.98);
        }
        .recipe-card.selected {
            border-color: var(--accent);
            box-shadow: 0 8px 24px var(--glow-color);
            background-color: var(--bg-base);
        }
        .recipe-card .check-icon {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .recipe-card.selected .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        
        .filter-panel {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .filter-panel.open {
            max-height: 400px;
            opacity: 1;
            margin-bottom: 16px;
        }

        .filter-chip {
            transition: all 0.2s ease;
        }
        .filter-chip.active {
            background-color: var(--accent);
            color: var(--btn-text);
            border-color: var(--accent);
        }

        
        .fab-container {
            transform: translateY(120%);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .fab-container.visible {
            transform: translateY(0);
            opacity: 1;
        }
        .fab-btn {
            box-shadow: 0 10px 30px var(--glow-color);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .fab-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px var(--glow-color);
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-item {
            opacity: 0;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

    </style>
</head>

    <script vid="159">
        
        function updateTimeAndTheme() {
            const now = new Date();
            const hours = now.getHours();
            
            const body = document.body;
            let currentTheme = '';

            if (hours >= 6 && hours < 12) {
                currentTheme = 'theme-morning';
            } else if (hours >= 12 && hours < 17) {
                currentTheme = 'theme-noon';
            } else if (hours >= 17 && hours < 20) {
                currentTheme = 'theme-evening';
            } else {
                currentTheme = 'theme-night';
            }

            if (!body.classList.contains(currentTheme)) {
                body.className = currentTheme;
            }
        }

        updateTimeAndTheme();
        setInterval(updateTimeAndTheme, 60000);

        
        const filterToggleBtn = document.getElementById('filter-toggle');
        const filterPanel = document.getElementById('filter-panel');
        
        filterToggleBtn.addEventListener('click', () => {
            filterPanel.classList.toggle('open');
            
            const icon = filterToggleBtn.querySelector('svg');
            if(filterPanel.classList.contains('open')) {
                filterToggleBtn.classList.remove('theme-bg-surface');
                filterToggleBtn.classList.add('theme-bg-accent');
                icon.classList.remove('theme-stroke-accent');
                icon.style.stroke = 'var(--btn-text)';
            } else {
                filterToggleBtn.classList.add('theme-bg-surface');
                filterToggleBtn.classList.remove('theme-bg-accent');
                icon.classList.add('theme-stroke-accent');
                icon.style.stroke = '';
            }
        });

        
        const filterChips = document.querySelectorAll('.filter-chip');
        filterChips.forEach(chip => {
            chip.addEventListener('click', (e) => {
                e.target.classList.toggle('active');
            });
        });

        
        let selectedCount = 0;
        const fabContainer = document.getElementById('fab-container');
        const fabText = document.getElementById('fab-text');

        function toggleSelect(element) {
            element.classList.toggle('selected');
            
            if (element.classList.contains('selected')) {
                selectedCount++;
            } else {
                selectedCount--;
            }

            updateFAB();
        }

        function updateFAB() {
            if (selectedCount > 0) {
                fabContainer.classList.add('visible');
                fabText.textContent = `开始烹饪 (${selectedCount})`;
            } else {
                fabContainer.classList.remove('visible');
            }
        }
    </script>
