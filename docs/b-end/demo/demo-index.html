<html lang="zh-CN" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" vid="3">
    <title vid="4">Cookingo - Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" vid="5">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" vid="6">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&amp;display=swap" rel="stylesheet" vid="7">
    <style vid="8">
        :root {
            
            --font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, sans-serif;
            --radius-massive: 64px;
            --radius-large: 32px;
            --radius-pill: 100px;
            --spacing-xs: 8px;
            --spacing-sm: 16px;
            --spacing-md: 24px;
            --spacing-lg: 40px;
            --spacing-xl: 64px;
            
            
            --transition-speed: 2s; 
        }

        
        
        body.theme-morning {
            --bg-base: #FFF5F0;
            --bg-surface: #FFE7D9;
            --text-main: #3D2012;
            --text-muted: rgba(61, 32, 18, 0.5);
            --accent: #FF8260;
            --accent-hover: #FF6A42;
            --glow-color: rgba(255, 130, 96, 0.4);
            --btn-text: #FFFFFF;
        }

        
        body.theme-noon {
            --bg-base: #FDFBF7; 
            --bg-surface: #F2EBE1;
            --text-main: #271E15; 
            --text-muted: rgba(39, 30, 21, 0.5);
            --accent: #DD6A2A; 
            --accent-hover: #C55C22;
            --glow-color: rgba(221, 106, 42, 0.3);
            --btn-text: #FFFFFF;
        }

        
        body.theme-evening {
            --bg-base: #2B160E;
            --bg-surface: #3D2218;
            --text-main: #FFF0E6;
            --text-muted: rgba(255, 240, 230, 0.6);
            --accent: #FF5E33;
            --accent-hover: #FF7A55;
            --glow-color: rgba(255, 94, 51, 0.2);
            --btn-text: #2B160E;
        }

        
        body.theme-night {
            --bg-base: #120C08;
            --bg-surface: #1E1510;
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent: #FF8200;
            --accent-hover: #FFA23A;
            --glow-color: rgba(255, 130, 0, 0.2);
            --btn-text: #120C08;
        }

        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            background-color: #000; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color var(--transition-speed) ease;
        }

        
        .device-frame {
            position: relative;
            width: 100%;
            height: 100vh;
            background-color: var(--bg-base);
            transition: background-color var(--transition-speed) ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-aspect-ratio: 10/21) and (min-width: 600px) {
            .device-frame {
                height: 90vh;
                width: calc(90vh * (10 / 21));
                border-radius: var(--radius-large);
                box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 0 0 8px #000;
                
            }
        }

        
        
        .ambient-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .ambient-orb {
            position: absolute;
            width: 120vw;
            height: 120vw;
            border-radius: 50%;
            background: radial-gradient(circle, var(--glow-color) 0%, rgba(0,0,0,0) 70%);
            top: -20%;
            left: -10%;
            filter: blur(60px);
            animation: breathe 12s infinite alternate ease-in-out;
            transition: background var(--transition-speed) ease;
        }

        .ambient-orb:nth-child(2) {
            top: auto;
            bottom: -30%;
            left: auto;
            right: -20%;
            width: 150vw;
            height: 150vw;
            animation-delay: -6s;
            animation-duration: 18s;
        }

        @keyframes breathe {
            0% { transform: scale(1) translate(0, 0); opacity: 0.6; }
            100% { transform: scale(1.1) translate(5%, 5%); opacity: 1; }
        }

        
        .content-layer {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: var(--spacing-xl) var(--spacing-md);
        }

        
        .system-status {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            opacity: 0;
            animation: fadeIn 1s ease 0.5s forwards;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background-color: var(--bg-surface);
            border-radius: var(--radius-pill);
            transition: background-color var(--transition-speed) ease;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--accent);
            animation: pulse-dot 2s infinite;
            transition: background-color var(--transition-speed) ease;
        }

        .status-time {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0.5px;
            transition: color var(--transition-speed) ease;
        }

        @keyframes pulse-dot {
            0% { box-shadow: 0 0 0 0 var(--glow-color); }
            70% { box-shadow: 0 0 0 6px rgba(0,0,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
        }

        
        .hero-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: var(--spacing-sm);
            margin-top: -10vh; 
        }

        .logo-mark {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            height: 80px;
            background-color: var(--bg-surface);
            border-radius: 30px; 
            margin-bottom: var(--spacing-sm);
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
            transition: background-color var(--transition-speed) ease;
        }

        
        .logo-mark svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: var(--accent);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke var(--transition-speed) ease;
        }

        .brand-name {
            font-size: 48px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -1.5px;
            line-height: 1.1;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
            transition: color var(--transition-speed) ease;
        }

        .brand-name span {
            color: var(--accent);
            transition: color var(--transition-speed) ease;
        }

        .welcome-text {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
            transition: color var(--transition-speed) ease;
        }

        
        .action-area {
            width: 100%;
            padding-bottom: var(--spacing-sm);
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
        }

        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 22px 24px;
            background-color: var(--accent);
            color: var(--btn-text);
            border: none;
            border-radius: var(--radius-pill);
            font-size: 18px;
            font-weight: 700;
            font-family: var(--font-family);
            cursor: pointer;
            outline: none;
            box-shadow: 0 10px 30px var(--glow-color);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1), background-color var(--transition-speed) ease, color var(--transition-speed) ease;
        }

        .btn-primary:active {
            transform: scale(0.97);
            box-shadow: 0 4px 15px var(--glow-color);
        }

        .btn-primary svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.3s ease;
        }

        
        @media (hover: hover) {
            .btn-primary:hover {
                background-color: var(--accent-hover);
                transform: translateY(-2px);
                box-shadow: 0 15px 35px var(--glow-color);
            }
            .btn-primary:hover svg {
                transform: translateX(4px);
            }
        }

        
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

    </style>
</head>
<body class="theme-night" vid="9"> 

    <div class="device-frame" vid="10">
        
        
        <div class="ambient-layer" vid="11">
            <div class="ambient-orb" vid="12"></div>
            <div class="ambient-orb" vid="13"></div>
        </div>

        
        <div class="content-layer" vid="14">
            
            <header class="system-status" vid="15">
                <div class="status-pill" vid="16">
                    <div class="status-dot" vid="17"></div>
                    <span class="status-time" id="time-display" vid="18">--:--</span>
                </div>
            </header>

            <main class="hero-section" vid="19">
                <div class="logo-mark" vid="20">
                    
                    <svg viewBox="0 0 24 24" vid="21">
                        <path d="M4 14C4 18.4183 7.58172 22 12 22C16.4183 22 20 18.4183 20 14" vid="22"></path>
                        <path d="M12 2L12 8" vid="23"></path>
                        <path d="M8 4L8 8" vid="24"></path>
                        <path d="M16 4L16 8" vid="25"></path>
                        <path d="M2 14H22" vid="26"></path>
                    </svg>
                </div>
                <h1 class="brand-name" vid="27">Cookingo<span vid="28">.</span></h1>
                <p class="welcome-text" vid="29">发现唤醒厨房的灵感菜谱</p>
            </main>

            <footer class="action-area" vid="30">
                <button class="btn-primary" onclick="triggerEnterAnimation()" vid="31">
                    <span vid="32">开启灵感</span>
                    <svg viewBox="0 0 24 24" vid="33">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" vid="34"></path>
                    </svg>
                </button>
            </footer>

        </div>
    </div>

    <script vid="35">
        
        function updateTimeAndTheme() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            
            document.getElementById('time-display').textContent = `${String(hours).padStart(2, '0')}:${minutes}`;

            
            const body = document.body;
            let currentTheme = '';

            if (hours >= 6 && hours < 12) {
                currentTheme = 'theme-morning';
            } else if (hours >= 12 && hours < 17) {
                currentTheme = 'theme-noon';
            } else if (hours >= 17 && hours < 20) {
                currentTheme = 'theme-evening';
            } else {
                currentTheme = 'theme-night';
            }

            
            if (!body.classList.contains(currentTheme)) {
                body.className = currentTheme;
            }
        }

        
        updateTimeAndTheme();
        
        
        setInterval(updateTimeAndTheme, 60000);

        
        function triggerEnterAnimation() {
            const btn = document.querySelector('.btn-primary');
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = '';
                
                
                const orbs = document.querySelectorAll('.ambient-orb');
                orbs.forEach(orb => {
                    orb.style.filter = 'blur(30px)';
                    orb.style.opacity = '1';
                    setTimeout(() => {
                        orb.style.filter = '';
                        orb.style.opacity = '';
                    }, 500);
                });
            }, 150);
        }
    </script>

</body></html>
